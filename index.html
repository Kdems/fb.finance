<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKYBAR Finance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white p-5">
      <h1 class="text-2xl font-bold mb-8">SKYBAR</h1>
      <nav class="space-y-3">
        <button class="w-full text-left px-4 py-3 rounded-xl bg-slate-800">Dashboard</button>
        <button class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Entry</button>
        <button class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Analytics</button>
        <button class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Reports</button>
        <button class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Settings</button>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-3xl font-bold">Finance Dashboard</h2>
          <p class="text-slate-500">Restaurant performance monitoring</p>
        </div>

        <div class="flex gap-3">
          <select class="border rounded-xl px-4 py-2">
            <option>2026</option>
          </select>
          <select class="border rounded-xl px-4 py-2">
            <option>May</option>
          </select>
        </div>
      </div>

      <!-- KPI -->
      <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-6 gap-4 mb-6">
        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">Daily Revenue</p>
          <h3 class="text-2xl font-bold">RM0</h3>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">MTD Revenue</p>
          <h3 class="text-2xl font-bold">RM0</h3>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">Food Cost %</p>
          <h3 class="text-2xl font-bold">0%</h3>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">Beverage Cost %</p>
          <h3 class="text-2xl font-bold">0%</h3>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">GOP</p>
          <h3 class="text-2xl font-bold">RM0</h3>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow">
          <p class="text-sm text-slate-500">Budget Variance</p>
          <h3 class="text-2xl font-bold">RM0</h3>
        </div>
      </div>

      <!-- Entry + Table -->
      <div class="grid lg:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl p-5 shadow">
          <h3 class="font-bold text-xl mb-4">Daily Entry</h3>

          <div class="space-y-3">
            <input type="date" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Food Revenue" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Beverage Revenue" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Food Cost" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Beverage Cost" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Fixed Cost" class="w-full border rounded-xl px-4 py-3">
            <input placeholder="Daily Budget" class="w-full border rounded-xl px-4 py-3">

            <button class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold">
              Save Entry
            </button>
          </div>
        </div>

        <div class="lg:col-span-2 bg-white rounded-2xl p-5 shadow">
          <h3 class="font-bold text-xl mb-4">Daily Revenue List</h3>

          <div class="overflow-auto">
            <table class="w-full text-left">
              <thead>
                <tr class="border-b">
                  <th class="py-3">Date</th>
                  <th>Total Revenue</th>
                  <th>Total Cost</th>
                  <th>GOP</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="py-4">--</td>
                  <td>RM0</td>
                  <td>RM0</td>
                  <td>RM0</td>
                  <td>Edit / Delete</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
