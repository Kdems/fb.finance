<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR BI Dashboard
  </title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>



<body class="bg-slate-100 font-sans">

<div class="flex min-h-screen">



  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h1 class="text-4xl font-bold mb-10">
      SKYBAR
    </h1>

  </aside>





  <!-- MAIN -->
  <main class="flex-1 p-8 space-y-6">


    <!-- HEADER -->
    <div class="flex justify-between items-center">

      <div>

        <h2 class="text-4xl font-bold">
          GM Dashboard
        </h2>

        <p class="text-slate-500">
          SKYBAR Business Intelligence
        </p>

      </div>


      <div class="flex gap-3">

        <select
          id="yearFilter"
          class="bg-white rounded-xl shadow px-4 py-2">
        </select>

        <select
          id="monthFilter"
          class="bg-white rounded-xl shadow px-4 py-2">
        </select>

      </div>

    </div>





    <!-- F&B SECTION -->
    <section class="bg-orange-200 rounded-3xl p-6 shadow space-y-5">

      <h3 class="font-bold text-xl">
        Food & Beverage Intelligence
      </h3>



      <div class="grid grid-cols-4 gap-4">

        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Food Revenue
          </small>

          <h4
            id="foodRevenueCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Food Mix %
          </small>

          <h4
            id="foodMixCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Food Cost %
          </small>

          <h4
            id="foodCostCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Food Growth
          </small>

          <h4
            id="foodGrowthCard">
          </h4>

        </div>

      </div>





      <div class="grid grid-cols-4 gap-4">

        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Beverage Revenue
          </small>

          <h4
            id="bevRevenueCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Beverage Mix %
          </small>

          <h4
            id="bevMixCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Beverage Cost %
          </small>

          <h4
            id="bevCostCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Beverage Growth
          </small>

          <h4
            id="bevGrowthCard">
          </h4>

        </div>

      </div>





      <div class="grid grid-cols-1">

        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Fixed Cost
          </small>

          <h4
            id="fixCostCard">
          </h4>

        </div>

      </div>


    </section>





    <!-- CHART -->
    <section class="grid grid-cols-3 gap-5">

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="revenueChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="gopChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="mixChart"></canvas>
      </div>

    </section>





    <!-- RECENT -->
    <section class="bg-white rounded-3xl p-6 shadow">

      <h3 class="font-bold text-xl mb-5">
        Recent Entries
      </h3>

      <div
        id="recentEntriesList">
      </div>

    </section>



  </main>

</div>



<script src="assets/js/storage.js"></script>
<script src="assets/js/settings.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/seed.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
