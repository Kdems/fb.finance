<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    SKYBAR Dashboard
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100">

<div class="min-h-screen flex">


  <!-- NAVIGATION -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h2 class="text-xl font-bold mb-8">
      SKYBAR
    </h2>

    <nav class="space-y-3">

      <a
        href="index.html"
        class="block text-cyan-400"
      >
        Dashboard
      </a>

      <a
        href="entry.html"
        class="block"
      >
        Entry
      </a>

      <a
        href="reports.html"
        class="block"
      >
        Reports
      </a>

      <a
        href="review.html"
        class="block"
      >
        Review
      </a>

      <a
        href="settings.html"
        class="block"
      >
        Settings
      </a>

    </nav>

  </aside>



  <!-- MAIN -->
  <main class="flex-1 p-8">


    <!-- HEADER -->
    <div class="mb-8 flex gap-4">

      <select
        id="yearFilter"
        class="border rounded-xl px-4 py-3"
      ></select>


      <select
        id="monthFilter"
        class="border rounded-xl px-4 py-3"
      ></select>

    </div>



    <!-- KPI -->
    <div class="grid md:grid-cols-4 gap-6 mb-8">


      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Total Revenue
        </p>

        <h3
          id="ytdRevenueCard"
          class="text-2xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Total Budget
        </p>

        <h3
          id="ytdBudgetCard"
          class="text-2xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Achievement
        </p>

        <h3
          id="ytdAchievementCard"
          class="text-2xl font-bold mt-2"
        >
          0%
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          GOP Margin
        </p>

        <h3
          id="gopMarginCard"
          class="text-2xl font-bold mt-2"
        >
          0%
        </h3>

      </div>


    </div>



    <!-- F&B -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">


      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Food Revenue
        </p>

        <h3
          id="foodRevenueCard"
          class="text-2xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Beverage Revenue
        </p>

        <h3
          id="bevRevenueCard"
          class="text-2xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>


    </div>



    <!-- RECENT -->
    <div class="bg-white rounded-2xl p-6 shadow">

      <h2 class="text-xl font-bold mb-6">
        Recent Entries
      </h2>


      <div
        id="recentEntriesList"
      ></div>

    </div>


  </main>

</div>



<script src="storage.js"></script>
<script src="settings.js"></script>
<script src="calculations.js"></script>
<script src="dashboard.js"></script>


</body>
</html>
