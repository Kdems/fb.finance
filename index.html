<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Dashboard
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-cyan-900">

<div class="w-full max-w-screen-2xl mx-auto px-6 space-y-6">

<nav class="bg-[#2563EB] text-white rounded-3xl px-6 py-4">

  <div class="flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

    <h1 class="text-2xl font-bold">
      Traders Hotel Kuala Lumpur
    </h1>

    <div class="flex flex-wrap gap-2 justify-center md:justify-start">

      <button
        onclick="location.href='index.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 bg-cyan-500">

        🏠 Dashboard

      </button>

      <button
        onclick="location.href='entry.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-blue-700">

        ➕ Entry

      </button>

      <button
        onclick="location.href='analysis.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-blue-700">

        📊 Analysis

      </button>

      <button
        onclick="location.href='report.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-blue-700">

        📄 Reports

      </button>

    </div>

  </div>

</nav>


  <!-- HEADER -->
  <section
    class="bg-slate-950 text-white rounded-3xl p-6">

    <div
      class="w-full flex justify-between items-center">

      <div class="flex items-center gap-4">
        <img
  id="dashboardLogo"
  src="assets/logos/skybar.png"
  class="h-14 w-14 object-contain"
>

    </div>

        <h1
          class="text-4xl font-bold">

          F&B Division

        </h1>



        <p
          class="text-slate-300">

          Multi Outlet Executive Dashboard

        </p>

      </div>






      <div
        class="w-full grid grid-cols-3 gap-3">



        <select
          id="dashboardOutlet"
          class="text-black rounded-xl px-4 py-2">

          <option value="ALL">
            ALL OUTLETS
          </option>

          <option value="SKYBAR">
            SKYBAR
          </option>

          <option value="GCC">
            GCC
          </option>

          <option value="BO6">
            BO6
          </option>

        </select>






        <select
          id="dashboardYear"
          class="text-black rounded-xl px-4 py-2">

        </select>






        <select
          id="dashboardMonth"
          class="text-black rounded-xl px-4 py-2">

        </select>

      </div>

    </div>

  </section>










  <!-- YTD -->
  <section
    id="ytdSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>










  <!-- MTD -->
  <section
    id="mtdSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>










  <!-- GOP -->
  <section
    id="gopSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>










  <!-- COST -->
  <section
    id="costSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>










  <!-- SUMMARY -->
  <section
    id="summarySection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>




  <section
    id="trendSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>




  <section
    id="rankingSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>



  <!-- RECENT -->
  <section
    id="recentSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>



  <!-- ALERTS -->
  <section
    id="alertSection"
    class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl mb-8">

  </section>



</div>





<script src="assets/js/storage.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
