<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Finance Dashboard
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div class="flex justify-between items-center">

        <div>

          <h2 class="text-3xl font-bold">
            Management Dashboard
          </h2>

          <p class="text-slate-500">
            SKYBAR Performance Cockpit
          </p>

        </div>


        <div class="flex gap-3">

          <select
            id="yearFilter"
            class="border rounded-xl px-4 py-2"
          ></select>

          <select
            id="monthFilter"
            class="border rounded-xl px-4 py-2"
          ></select>

        </div>

      </div>



      <!-- YTD -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="font-bold text-xl mb-4">
          Year-To-Date
        </h3>

        <div class="grid xl:grid-cols-5 gap-4">

          <div id="ytdRevenueCard"></div>

          <div id="ytdBudgetCard"></div>

          <div id="ytdAchievementCard"></div>

          <div id="ytdVarianceCard"></div>

          <div id="ytdBalanceCard"></div>

        </div>

      </section>



      <!-- MTD -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="font-bold text-xl mb-4">
          Month-To-Date
        </h3>

        <div class="grid xl:grid-cols-5 gap-4 mb-4">

          <div id="mtdRevenueCard"></div>

          <div id="mtdBudgetCard"></div>

          <div id="mtdGopCard"></div>

          <div id="mtdAchievementCard"></div>

          <div id="mtdVarianceCard"></div>

        </div>


        <div class="grid xl:grid-cols-4 gap-4">

          <div id="daysLeftCard"></div>

          <div id="dailyPaceCard"></div>

          <div id="projectionCard"></div>

          <div id="gapToTargetCard"></div>

        </div>

      </section>



      <!-- GOP -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="font-bold text-xl mb-4">
          Gross Operating Profit
        </h3>

        <div class="grid xl:grid-cols-4 gap-4">

          <div id="gopRevenueCard"></div>

          <div id="gopCostCard"></div>

          <div id="gopMainCard"></div>

          <div id="gopMarginCard"></div>

        </div>

      </section>



      <!-- FOOD & BEVERAGE -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="font-bold text-xl mb-4">
          Food & Beverage
        </h3>

        <div class="grid xl:grid-cols-3 gap-4">

          <div id="foodRevenueCard"></div>

          <div id="bevRevenueCard"></div>

          <div id="totalCostCard"></div>

        </div>

      </section>



      <!-- SUMMARY -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="font-bold text-xl mb-4">
          Monthly Summary
        </h3>

        <div class="grid xl:grid-cols-5 gap-4">

          <div id="summaryRevenueCard"></div>

          <div id="summaryBudgetCard"></div>

          <div id="summaryAchievementCard"></div>

          <div id="bestDayCard"></div>

          <div id="worstDayCard"></div>

        </div>

      </section>



      <!-- CHARTS -->
      <section class="grid xl:grid-cols-3 gap-6">


        <!-- REVENUE -->
        <div class="bg-white rounded-2xl shadow p-5">

          <h3 class="font-bold mb-4">
            Revenue Trend
          </h3>

          <div class="h-80">

            <canvas
              id="revenueChart"
            ></canvas>

          </div>

        </div>


        <!-- GOP -->
        <div class="bg-white rounded-2xl shadow p-5">

          <h3 class="font-bold mb-4">
            GOP Trend
          </h3>

          <div class="h-80">

            <canvas
              id="gopChart"
            ></canvas>

          </div>

        </div>


        <!-- MIX -->
        <div class="bg-white rounded-2xl shadow p-5">

          <h3 class="font-bold mb-4">
            Food vs Beverage
          </h3>

          <div class="h-80">

            <canvas
              id="mixChart"
            ></canvas>

          </div>

        </div>

      </section>


    </main>

  </div>



  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="assets/js/storage.js"></script>

  <script src="assets/js/settings.js"></script>

  <script src="assets/js/calculations.js"></script>

  <script src="assets/js/charts.js"></script>

  <script src="assets/js/dashboard.js"></script>


</body>

</html>
