<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Dashboard
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="p-6 space-y-6">




  <!-- HEADER -->
  <section
    class="bg-slate-950 text-white rounded-3xl p-6">

    <div
      class="flex justify-between items-center">

      <div>

        <h1
          class="text-4xl font-bold">

          SKYBAR Finance

        </h1>



        <p
          class="text-slate-300">

          Multi Outlet Executive Dashboard

        </p>

      </div>






      <div
        class="grid grid-cols-3 gap-3">



        <select
          id="dashboardOutlet"
          class="text-black rounded-xl px-4 py-2">

          <option value="ALL">
            ALL OUTLETS
          </option>

          <option value="SKYBAR">
            SKYBAR
          </option>

          <option value="GCC">
            GCC
          </option>

          <option value="BO6">
            BO6
          </option>

        </select>






        <select
          id="dashboardYear"
          class="text-black rounded-xl px-4 py-2">

        </select>






        <select
          id="dashboardMonth"
          class="text-black rounded-xl px-4 py-2">

        </select>

      </div>

    </div>

  </section>










  <!-- YTD -->
  <section
    id="ytdSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- MTD -->
  <section
    id="mtdSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- GOP -->
  <section
    id="gopSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- COST -->
  <section
    id="costSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- SUMMARY -->
  <section
    id="summarySection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>




  <section
    id="trendSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>




  <section
    id="rankingSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>



  <!-- RECENT -->
  <section
    id="recentSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- OUTLET -->
  <section
    id="rankingSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>










  <!-- ALERTS -->
  <section
    id="alertSection"
    class="bg-white rounded-3xl p-6 shadow">

  </section>



</div>





<script src="assets/js/storage.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
