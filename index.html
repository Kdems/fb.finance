<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR GM Dashboard
  </title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>



<body class="bg-slate-100 font-sans">

<div class="flex min-h-screen">



  <aside class="w-64 bg-slate-950 text-white p-6">

    <h1 class="text-4xl font-bold">
      SKYBAR
    </h1>

  </aside>





  <main class="flex-1 p-8 space-y-6">


    <!-- HEADER -->
    <div class="flex justify-between">

      <div>

        <h2 class="text-4xl font-bold">
          GM Dashboard
        </h2>

        <p class="text-slate-500">
          Business Intelligence
        </p>

      </div>


      <div class="flex gap-3">

        <select
          id="yearFilter"
          class="bg-white shadow rounded-xl px-4 py-2">
        </select>

        <select
          id="monthFilter"
          class="bg-white shadow rounded-xl px-4 py-2">
        </select>

      </div>

    </div>






    <!-- GOP -->
    <section class="bg-emerald-200 rounded-3xl p-6 shadow">

      <h3 class="font-bold text-xl mb-5">
        Gross Operating Profit
      </h3>


      <div class="grid grid-cols-4 gap-4">

        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Revenue
          </small>

          <h4
            id="gopRevenueCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Total Cost
          </small>

          <h4
            id="gopCostCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            GOP
          </small>

          <h4
            id="gopMainCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Margin
          </small>

          <h4
            id="gopMarginCard">
          </h4>

        </div>

      </div>





      <div class="grid grid-cols-3 gap-4 mt-4">

        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Food Cost %
          </small>

          <h4
            id="gopFoodCostCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Beverage Cost %
          </small>

          <h4
            id="gopBevCostCard">
          </h4>

        </div>



        <div class="bg-white/70 rounded-2xl p-4">

          <small>
            Fixed Cost %
          </small>

          <h4
            id="gopFixCostCard">
          </h4>

        </div>

      </div>


    </section>






    <!-- CHART -->
    <section class="grid grid-cols-3 gap-5">

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="revenueChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="gopChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="mixChart"></canvas>
      </div>

    </section>






    <!-- RECENT -->
    <section class="bg-white rounded-3xl p-6 shadow">

      <h3 class="font-bold text-xl mb-5">
        Recent Entries
      </h3>

      <div
        id="recentEntriesList">
      </div>

    </section>



  </main>

</div>



<script src="assets/js/storage.js"></script>
<script src="assets/js/settings.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/seed.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
