<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Dashboard
  </title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">



    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-950 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>

      <nav class="space-y-3">

        <a href="index.html"
          class="block px-4 py-3 rounded-xl bg-slate-800">
          Dashboard
        </a>

        <a href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Daily Entry
        </a>

        <a href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Operating Review
        </a>

        <a href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Reports
        </a>

        <a href="settings.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Settings
        </a>

      </nav>

    </aside>





    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div class="flex justify-between items-center">

        <h2 class="text-3xl font-bold">
          Management Dashboard
        </h2>


        <div class="flex gap-3">

          <select
            id="yearFilter"
            class="border rounded-xl px-4 py-2">
          </select>

          <select
            id="monthFilter"
            class="border rounded-xl px-4 py-2">
          </select>

        </div>

      </div>





      <!-- MTD -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <h3 class="font-bold mb-4">
          Month-To-Date
        </h3>


        <div class="grid grid-cols-6 gap-4">


          <div class="kpi-card">
            <small>Revenue</small>
            <h4 id="mtdRevenueCard">-</h4>
          </div>


          <div class="kpi-card">
            <small>Budget</small>
            <h4 id="mtdBudgetCard">-</h4>
          </div>


          <div class="kpi-card">
            <small>GOP</small>
            <h4 id="mtdGopCard">-</h4>
          </div>


          <div class="kpi-card">
            <small>Growth</small>
            <h4 id="mtdGrowthCard">-</h4>
          </div>


          <div class="kpi-card">
            <small>LY Revenue</small>
            <h4 id="mtdLyRevenueCard">-</h4>
          </div>



          <!-- MTD PROGRESS -->
          <div class="kpi-card">

            <small>
              Achievement
            </small>

            <h4 id="mtdAchievementCard">
              -
            </h4>


            <div
              class="w-full bg-slate-200 rounded-full h-2 mt-3">

              <div
                id="mtdProgressBar"
                class="h-2 rounded-full"
                style="width:0%">
              </div>

            </div>

          </div>


        </div>

      </section>





      <!-- SUMMARY -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <h3 class="font-bold mb-4">
          Recent Entries
        </h3>

        <div
          id="recentEntriesList"
          class="space-y-3">

        </div>

      </section>



    </main>

  </div>




  <script src="assets/js/storage.js"></script>
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/calculations.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/dashboard.js"></script>

</body>
</html>
