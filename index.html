<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SKYBAR Executive Dashboard</title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>



<body class="bg-slate-100 font-sans">

<div class="flex min-h-screen">



  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h1 class="text-3xl font-bold mb-10">
      SKYBAR
    </h1>


    <nav class="space-y-3">

      <a href="index.html"
        class="block bg-slate-800 rounded-xl px-4 py-3">
        Dashboard
      </a>

      <a href="entry.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Daily Entry
      </a>

      <a href="generic.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Operating Review
      </a>

      <a href="reports.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Reports
      </a>

      <a href="settings.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Settings
      </a>

    </nav>

  </aside>




  <!-- MAIN -->
  <main class="flex-1 p-8 space-y-8">


    <!-- HEADER -->
    <div class="flex justify-between items-center">

      <div>

        <h2 class="text-4xl font-bold text-slate-900">
          Executive Dashboard
        </h2>

        <p class="text-slate-500 mt-1">
          SKYBAR Financial Intelligence
        </p>

      </div>


      <div class="flex gap-3">

        <select
          id="yearFilter"
          class="bg-white shadow px-4 py-2 rounded-xl">
        </select>

        <select
          id="monthFilter"
          class="bg-white shadow px-4 py-2 rounded-xl">
        </select>

      </div>

    </div>




    <!-- KPI ROW -->
    <section class="grid grid-cols-4 gap-5">


      <div class="bg-gradient-to-r from-slate-900 to-slate-700 text-white rounded-2xl p-5 shadow">

        <p class="text-sm opacity-70">
          Revenue
        </p>

        <h3
          id="ytdRevenueCard"
          class="text-3xl font-bold mt-2">
          -
        </h3>

      </div>



      <div class="bg-gradient-to-r from-green-700 to-green-500 text-white rounded-2xl p-5 shadow">

        <p class="text-sm opacity-70">
          GOP
        </p>

        <h3
          id="gopMainCard"
          class="text-3xl font-bold mt-2">
          -
        </h3>

      </div>



      <div class="bg-gradient-to-r from-red-700 to-red-500 text-white rounded-2xl p-5 shadow">

        <p class="text-sm opacity-70">
          Cost
        </p>

        <h3
          id="gopCostCard"
          class="text-3xl font-bold mt-2">
          -
        </h3>

      </div>



      <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-2xl p-5 shadow">

        <p class="text-sm opacity-70">
          Achievement
        </p>

        <h3
          id="mtdAchievementCard"
          class="text-3xl font-bold mt-2">
          -
        </h3>

        <div class="bg-white/20 h-2 rounded-full mt-4">

          <div
            id="mtdProgressBar"
            class="h-2 rounded-full bg-white"
            style="width:0%">
          </div>

        </div>

      </div>


    </section>




    <!-- ANALYTICS -->
    <section class="grid grid-cols-3 gap-5">

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="revenueChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="gopChart"></canvas>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow">
        <canvas id="mixChart"></canvas>
      </div>

    </section>




    <!-- RECENT -->
    <section class="bg-white rounded-2xl p-6 shadow">

      <h3 class="font-bold text-lg mb-5">
        Recent Revenue Activity
      </h3>

      <div
        id="recentEntriesList"
        class="space-y-3">
      </div>

    </section>



  </main>

</div>




<script src="assets/js/storage.js"></script>
<script src="assets/js/settings.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/seed.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
