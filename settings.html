<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Settings
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Dashboard
        </a>


        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Daily Entry
        </a>


        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Operating Review
        </a>


        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Reports
        </a>


        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6">


      <div class="mb-6">

        <h2 class="text-3xl font-bold">
          Finance Settings
        </h2>

        <p class="text-slate-500">
          Monthly financial planning and annual targets
        </p>

      </div>



      <div
        class="max-w-5xl bg-white rounded-2xl p-6 shadow"
      >


        <form
          id="settingsForm"
          class="space-y-8"
        >


          <!-- PROFILE -->
          <section>

            <h3
              class="text-lg font-bold mb-4"
            >
              Business Profile
            </h3>


            <div
              class="grid md:grid-cols-2 gap-4"
            >


              <div>

                <label class="block mb-2 text-sm font-medium">
                  Outlet Name
                </label>

                <input
                  id="outletName"
                  type="text"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>



              <div>

                <label class="block mb-2 text-sm font-medium">
                  Currency
                </label>

                <select
                  id="currency"
                  class="w-full border rounded-xl px-4 py-3"
                >

                  <option value="RM">
                    RM
                  </option>

                  <option value="USD">
                    USD
                  </option>

                </select>

              </div>


            </div>

          </section>



          <!-- ANNUAL TARGET -->
          <section>

            <h3
              class="text-lg font-bold mb-4"
            >
              Annual Targets
            </h3>


            <div
              class="grid md:grid-cols-2 gap-4"
            >


              <div>

                <label class="block mb-2 text-sm font-medium">
                  Annual Revenue Target
                </label>

                <input
                  id="annualRevenueTarget"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>



              <div>

                <label class="block mb-2 text-sm font-medium">
                  Annual GOP Target
                </label>

                <input
                  id="annualGopTarget"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>


            </div>

          </section>



          <!-- MONTHLY FINANCE -->
          <section>

            <h3
              class="text-lg font-bold mb-4"
            >
              Monthly Finance Inputs
            </h3>


            <div
              class="grid md:grid-cols-2 xl:grid-cols-4 gap-4"
            >


              <div>

                <label class="block mb-2 text-sm font-medium">
                  Monthly Food Cost
                </label>

                <input
                  id="monthlyFoodCost"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>



              <div>

                <label class="block mb-2 text-sm font-medium">
                  Monthly Beverage Cost
                </label>

                <input
                  id="monthlyBeverageCost"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>



              <div>

                <label class="block mb-2 text-sm font-medium">
                  Monthly Fixed Cost
                </label>

                <input
                  id="monthlyFixedCost"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>



              <div>

                <label class="block mb-2 text-sm font-medium">
                  Monthly Budget
                </label>

                <input
                  id="monthlyBudget"
                  type="number"
                  class="w-full border rounded-xl px-4 py-3"
                />

              </div>


            </div>

          </section>



          <!-- SECURITY -->
          <section>

            <h3
              class="text-lg font-bold mb-4"
            >
              Security
            </h3>


            <div
              class="max-w-sm"
            >

              <label class="block mb-2 text-sm font-medium">
                PIN Access
              </label>

              <input
                id="pinCode"
                type="password"
                class="w-full border rounded-xl px-4 py-3"
              />

            </div>

          </section>



          <!-- BUTTON -->
          <div
            class="flex justify-end"
          >

            <button
              type="submit"
              class="bg-slate-900 text-white px-8 py-3 rounded-xl"
            >
              Save Settings
            </button>

          </div>


        </form>


      </div>


    </main>

  </div>



  <script src="assets/js/settings.js"></script>

</body>

</html>
