<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Settings
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6">


      <!-- HEADER -->
      <div class="mb-6">

        <h2 class="text-3xl font-bold">
          Finance Settings
        </h2>

        <p class="text-slate-500">
          Manage finance targets, cost benchmarks and backup
        </p>

      </div>



      <!-- SETTINGS FORM -->
      <div class="bg-white rounded-2xl shadow p-6">


        <form
          id="settingsForm"
          class="grid md:grid-cols-2 gap-4"
        >

          <input
            id="outletName"
            type="text"
            placeholder="Outlet Name"
            class="border rounded-xl p-3"
          />


          <select
            id="currency"
            class="border rounded-xl p-3"
          >

            <option value="RM">
              RM
            </option>

            <option value="$">
              $
            </option>

          </select>


          <input
            id="annualRevenueTarget"
            type="number"
            placeholder="Annual Revenue Target"
            class="border rounded-xl p-3"
          />


          <input
            id="annualGopTarget"
            type="number"
            placeholder="Annual GOP Target"
            class="border rounded-xl p-3"
          />


          <input
            id="monthlyBudget"
            type="number"
            placeholder="Monthly Budget"
            class="border rounded-xl p-3"
          />


          <input
            id="foodCostPercent"
            type="number"
            placeholder="Monthly Food Cost %"
            class="border rounded-xl p-3"
          />


          <input
            id="beverageCostPercent"
            type="number"
            placeholder="Monthly Beverage Cost %"
            class="border rounded-xl p-3"
          />


          <input
            id="fixCostPercent"
            type="number"
            placeholder="Monthly Fix Cost %"
            class="border rounded-xl p-3"
          />


          <input
            id="systemPin"
            type="password"
            placeholder="System PIN"
            class="border rounded-xl p-3"
          />


          <div></div>


          <!-- SAVE -->
          <button
            type="submit"
            class="col-span-2 bg-slate-900 text-white rounded-xl p-4 font-semibold"
          >
            Save Settings
          </button>

        </form>

      </div>



      <!-- BACKUP -->
      <div class="bg-white rounded-2xl shadow p-6 mt-6">

        <h3 class="text-xl font-bold mb-4">
          Backup & Restore
        </h3>


        <div class="grid md:grid-cols-2 gap-4">


          <button
            onclick="exportBackup()"
            class="bg-green-600 text-white rounded-xl p-4 font-semibold"
          >
            Export Backup
          </button>


          <label
            class="bg-blue-600 text-white rounded-xl p-4 font-semibold text-center cursor-pointer"
          >

            Restore Backup

            <input
              type="file"
              accept=".json"
              onchange="handleBackupUpload(this)"
              hidden
            />

          </label>

        </div>

      </div>


    </main>

  </div>



  <!-- SCRIPTS -->

  <script src="assets/js/storage.js"></script>

  <script src="assets/js/settings.js"></script>

  <script src="assets/js/backup.js"></script>


</body>

</html>
