<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    SKYBAR Settings
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100">

<div class="min-h-screen flex">


  <!-- NAVIGATION -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h2 class="text-xl font-bold mb-8">
      SKYBAR
    </h2>

    <nav class="space-y-3">

      <a
        href="index.html"
        class="block"
      >
        Dashboard
      </a>

      <a
        href="entry.html"
        class="block"
      >
        Entry
      </a>

      <a
        href="reports.html"
        class="block"
      >
        Reports
      </a>

      <a
        href="review.html"
        class="block"
      >
        Review
      </a>

      <a
        href="settings.html"
        class="block text-cyan-400"
      >
        Settings
      </a>

    </nav>

  </aside>



  <!-- MAIN -->
  <main class="flex-1 p-8">


    <div class="mb-8">

      <h1 class="text-3xl font-bold">
        Data Management
      </h1>

      <p class="text-slate-500 mt-2">
        Backup, restore, clear, and reset finance system
      </p>

    </div>



    <div class="grid gap-4 max-w-xl">


      <!-- EXPORT -->
      <button
        onclick="exportBackup()"
        class="bg-slate-950 text-white rounded-2xl p-5 text-left font-semibold"
      >
        Export Backup
      </button>



      <!-- IMPORT -->
      <label
        class="bg-white rounded-2xl p-5 shadow cursor-pointer font-semibold"
      >

        Restore Backup

        <input
          type="file"
          accept=".json"
          onchange="importBackup(this)"
          class="hidden"
        >

      </label>



      <!-- CLEAR -->
      <button
        onclick="clearEntriesOnly()"
        class="bg-orange-500 text-white rounded-2xl p-5 text-left font-semibold"
      >
        Clear Daily Entries
      </button>



      <!-- RESET -->
      <button
        onclick="resetAllData()"
        class="bg-red-600 text-white rounded-2xl p-5 text-left font-semibold"
      >
        Reset Entire System
      </button>


    </div>


  </main>

</div>



<script src="storage.js"></script>
<script src="settings.js"></script>
<script src="settings-page.js"></script>


</body>
</html>
