<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Settings
  </title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>



<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">



    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-950 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>

      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl bg-slate-800">
          Settings
        </a>

      </nav>

    </aside>





    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div>

        <h2 class="text-3xl font-bold">
          Finance Settings
        </h2>

        <p class="text-slate-500">
          Manage targets, costs, benchmark and data tools
        </p>

      </div>





      <!-- SETTINGS FORM -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <form
          id="settingsForm"
          class="grid grid-cols-2 gap-6">



          <!-- OUTLET -->
          <div>

            <label class="block mb-2 font-medium">
              Outlet Name
            </label>

            <input
              id="outletName"
              type="text"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- CURRENCY -->
          <div>

            <label class="block mb-2 font-medium">
              Currency
            </label>

            <select
              id="currency"
              class="w-full border rounded-xl p-3">

              <option value="RM">
                RM
              </option>

              <option value="$">
                USD
              </option>

              <option value="SGD">
                SGD
              </option>

            </select>

          </div>



          <!-- ANNUAL TARGET -->
          <div>

            <label class="block mb-2 font-medium">
              Annual Revenue Target
            </label>

            <input
              id="annualRevenueTarget"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- MONTHLY BUDGET -->
          <div>

            <label class="block mb-2 font-medium">
              Monthly Budget
            </label>

            <input
              id="monthlyBudget"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- FOOD COST -->
          <div>

            <label class="block mb-2 font-medium">
              Food Cost %
            </label>

            <input
              id="foodCostPercent"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- BEVERAGE COST -->
          <div>

            <label class="block mb-2 font-medium">
              Beverage Cost %
            </label>

            <input
              id="beverageCostPercent"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- FIXED COST -->
          <div>

            <label class="block mb-2 font-medium">
              Fixed Cost %
            </label>

            <input
              id="fixCostPercent"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- LY FOOD -->
          <div>

            <label class="block mb-2 font-medium">
              LY Food Revenue
            </label>

            <input
              id="lyFoodRevenue"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- LY BEVERAGE -->
          <div>

            <label class="block mb-2 font-medium">
              LY Beverage Revenue
            </label>

            <input
              id="lyBeverageRevenue"
              type="number"
              class="w-full border rounded-xl p-3"
            />

          </div>




          <!-- SAVE -->
          <div class="col-span-2">

            <button
              type="submit"
              class="w-full bg-slate-950 text-white rounded-xl p-4 font-semibold">

              Save Settings

            </button>

          </div>



        </form>

      </section>





      <!-- DATA MANAGEMENT -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <h3 class="text-2xl font-bold mb-6">
          Data Management
        </h3>


        <div class="grid grid-cols-3 gap-4">

          <button
            id="exportBackupBtn"
            class="bg-green-600 text-white rounded-xl p-4 font-semibold">

            Export Backup

          </button>


          <button
            id="importBackupBtn"
            class="bg-blue-600 text-white rounded-xl p-4 font-semibold">

            Restore Backup

          </button>


          <button
            id="resetDataBtn"
            class="bg-red-600 text-white rounded-xl p-4 font-semibold">

            Reset Data

          </button>

        </div>


        <input
          type="file"
          id="importBackupFile"
          hidden
        />

      </section>



    </main>

  </div>





  <script src="assets/js/storage.js"></script>

  <script src="assets/js/settings.js"></script>



</body>

</html>
