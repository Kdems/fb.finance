<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYBAR Settings</title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-950 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>

      <nav class="space-y-3">

        <a href="index.html" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Dashboard
        </a>

        <a href="entry.html" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Daily Entry
        </a>

        <a href="generic.html" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Operating Review
        </a>

        <a href="reports.html" class="block px-4 py-3 rounded-xl hover:bg-slate-800">
          Reports
        </a>

        <a href="settings.html" class="block px-4 py-3 rounded-xl bg-slate-800">
          Settings
        </a>

      </nav>

    </aside>



    <!-- Main -->
    <main class="flex-1 p-6">

      <h2 class="text-3xl font-bold mb-6">
        Finance Settings
      </h2>


      <form id="settingsForm" class="bg-white rounded-2xl p-6 shadow grid grid-cols-2 gap-6">

        <input id="outletName" class="border rounded-xl p-3" placeholder="Outlet Name">

        <select id="currency" class="border rounded-xl p-3">
          <option value="RM">RM</option>
          <option value="$">USD</option>
        </select>

        <input id="annualRevenueTarget" type="number" class="border rounded-xl p-3" placeholder="Annual Revenue Target">

        <input id="monthlyBudget" type="number" class="border rounded-xl p-3" placeholder="Monthly Budget">

        <input id="foodCostPercent" type="number" class="border rounded-xl p-3" placeholder="Food Cost %">

        <input id="beverageCostPercent" type="number" class="border rounded-xl p-3" placeholder="Beverage Cost %">

        <input id="fixCostPercent" type="number" class="border rounded-xl p-3" placeholder="Fixed Cost %">

        <input id="lyFoodRevenue" type="number" class="border rounded-xl p-3" placeholder="LY Food Revenue">

        <input id="lyBeverageRevenue" type="number" class="border rounded-xl p-3" placeholder="LY Beverage Revenue">


        <button type="submit"
          class="col-span-2 bg-slate-950 text-white p-4 rounded-xl font-semibold">
          Save Settings
        </button>

      </form>

    </main>

  </div>


  <script src="assets/js/storage.js"></script>
  <script src="assets/js/settings.js"></script>

</body>
</html>
