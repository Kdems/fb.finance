<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Operating Review
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-950 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div>

        <h2 class="text-3xl font-bold">
          Operating Review
        </h2>

        <p class="text-slate-500">
          Record qualitative business insights and action plans
        </p>

      </div>



      <!-- FORM -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <form
          id="reviewForm"
          class="space-y-5"
        >


          <!-- DATE -->
          <div>

            <label class="block mb-2 font-medium">
              Review Date
            </label>

            <input
              id="reviewDate"
              type="date"
              required
              class="w-full border rounded-xl p-3"
            />

          </div>



          <!-- REVENUE -->
          <div>

            <label class="block mb-2 font-medium">
              Revenue Commentary
            </label>

            <textarea
              id="revenueComment"
              rows="4"
              class="w-full border rounded-xl p-3"
              placeholder="Example: Weekend event boosted beverage sales..."
            ></textarea>

          </div>



          <!-- COST -->
          <div>

            <label class="block mb-2 font-medium">
              Cost Commentary
            </label>

            <textarea
              id="costComment"
              rows="4"
              class="w-full border rounded-xl p-3"
              placeholder="Example: Seafood promotion increased food cost..."
            ></textarea>

          </div>



          <!-- OPERATION -->
          <div>

            <label class="block mb-2 font-medium">
              Operational Notes
            </label>

            <textarea
              id="operationComment"
              rows="4"
              class="w-full border rounded-xl p-3"
              placeholder="Example: Guest flow slower during weekday lunch..."
            ></textarea>

          </div>



          <!-- ACTION -->
          <div>

            <label class="block mb-2 font-medium">
              Action Plan
            </label>

            <textarea
              id="actionPlan"
              rows="4"
              class="w-full border rounded-xl p-3"
              placeholder="Example: Push happy hour promotion..."
            ></textarea>

          </div>



          <!-- SAVE -->
          <button
            type="submit"
            class="bg-slate-900 text-white rounded-xl px-6 py-3 font-semibold"
          >
            Save Review
          </button>


        </form>

      </section>



      <!-- HISTORY -->
      <section class="bg-white rounded-2xl p-6 shadow">

        <h3 class="text-xl font-bold mb-4">
          Review History
        </h3>


        <div
          id="reviewHistory"
          class="space-y-4"
        ></div>

      </section>


    </main>

  </div>



  <!-- SCRIPTS -->

  <script src="assets/js/review.js"></script>


</body>

</html>
