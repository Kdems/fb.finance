<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Reports
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-950 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div class="flex justify-between items-center">

        <div>

          <h2 class="text-3xl font-bold">
            Monthly Finance Report
          </h2>

          <p class="text-slate-500">
            Management reporting overview
          </p>

        </div>


        <div class="flex gap-3">

          <select
            id="reportYear"
            class="border rounded-xl px-4 py-2"
          ></select>


          <select
            id="reportMonth"
            class="border rounded-xl px-4 py-2"
          ></select>

        </div>

      </div>



      <!-- KPI -->
      <section class="grid xl:grid-cols-5 gap-4">


        <div class="kpi-card">

          <span class="kpi-label">
            Revenue
          </span>

          <h4 id="reportRevenue">
            -
          </h4>

        </div>



        <div class="kpi-card">

          <span class="kpi-label">
            Budget
          </span>

          <h4 id="reportBudget">
            -
          </h4>

        </div>



        <div class="kpi-card">

          <span class="kpi-label">
            Achievement
          </span>

          <h4 id="reportAchievement">
            -
          </h4>

        </div>



        <div class="kpi-card">

          <span class="kpi-label">
            GOP
          </span>

          <h4 id="reportGop">
            -
          </h4>

        </div>



        <div class="kpi-card">

          <span class="kpi-label">
            Margin
          </span>

          <h4 id="reportMargin">
            -
          </h4>

        </div>


      </section>



      <!-- TABLE -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="text-xl font-bold mb-4">
          Daily Breakdown
        </h3>


        <div class="overflow-x-auto">

          <table class="w-full text-sm">

            <thead>

              <tr class="border-b text-left">

                <th class="py-3">
                  Date
                </th>

                <th>
                  Food
                </th>

                <th>
                  Beverage
                </th>

                <th>
                  Revenue
                </th>

                <th>
                  Cost
                </th>

                <th>
                  GOP
                </th>

              </tr>

            </thead>


            <tbody
              id="reportTableBody"
            ></tbody>

          </table>

        </div>

      </section>


    </main>

  </div>



  <!-- SCRIPTS -->

  <script src="assets/js/storage.js"></script>

  <script src="assets/js/settings.js"></script>

  <script src="assets/js/calculations.js"></script>

  <script src="assets/js/dashboard.js"></script>

  <script src="assets/js/reports.js"></script>


</body>

</html>
