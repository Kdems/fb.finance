<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    SKYBAR Reports
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100">

<div class="min-h-screen flex">


  <!-- NAVIGATION -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h2 class="text-xl font-bold mb-8">
      SKYBAR
    </h2>

    <nav class="space-y-3">

      <a
        href="index.html"
        class="block"
      >
        Dashboard
      </a>

      <a
        href="entry.html"
        class="block"
      >
        Entry
      </a>

      <a
        href="reports.html"
        class="block text-cyan-400"
      >
        Reports
      </a>

      <a
        href="review.html"
        class="block"
      >
        Review
      </a>

      <a
        href="settings.html"
        class="block"
      >
        Settings
      </a>

    </nav>

  </aside>



  <!-- MAIN -->
  <main class="flex-1 p-8">


    <!-- FILTER -->
    <div class="mb-8 flex gap-4">

      <select
        id="reportYear"
        class="border rounded-xl px-4 py-3"
      ></select>



      <select
        id="reportMonth"
        class="border rounded-xl px-4 py-3"
      ></select>

    </div>



    <!-- KPI -->
    <div class="grid md:grid-cols-5 gap-4 mb-8">


      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Revenue
        </p>

        <h3
          id="reportRevenue"
          class="text-xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Budget
        </p>

        <h3
          id="reportBudget"
          class="text-xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          Achievement
        </p>

        <h3
          id="reportAchievement"
          class="text-xl font-bold mt-2"
        >
          0%
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          GOP
        </p>

        <h3
          id="reportGop"
          class="text-xl font-bold mt-2"
        >
          RM0
        </h3>

      </div>



      <div class="bg-white rounded-2xl p-6 shadow">

        <p class="text-slate-500 text-sm">
          GOP Margin
        </p>

        <h3
          id="reportMargin"
          class="text-xl font-bold mt-2"
        >
          0%
        </h3>

      </div>


    </div>



    <!-- EXPORT -->
    <button
      onclick="exportReportCSV()"
      class="bg-slate-950 text-white px-6 py-3 rounded-xl mb-8"
    >
      Export CSV
    </button>



    <!-- TABLE -->
    <div class="bg-white rounded-2xl p-6 shadow">

      <h2 class="text-xl font-bold mb-6">
        Finance Report
      </h2>



      <div class="overflow-x-auto">

        <table class="w-full">

          <thead>

            <tr class="border-b">

              <th class="text-left py-3">
                Date
              </th>

              <th class="text-left">
                Food
              </th>

              <th class="text-left">
                Beverage
              </th>

              <th class="text-left">
                Revenue
              </th>

              <th class="text-left">
                Cost
              </th>

              <th class="text-left">
                GOP
              </th>

            </tr>

          </thead>



          <tbody
            id="reportTableBody"
          ></tbody>

        </table>

      </div>

    </div>


  </main>

</div>



<script src="storage.js"></script>
<script src="settings.js"></script>
<script src="calculations.js"></script>
<script src="reports.js"></script>


</body>
</html>
