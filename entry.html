<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    SKYBAR Finance Entry
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100">

<div class="min-h-screen flex">


  <!-- NAVIGATION -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h2 class="text-xl font-bold mb-8">
      SKYBAR
    </h2>

    <nav class="space-y-3">

      <a
        href="index.html"
        class="block"
      >
        Dashboard
      </a>

      <a
        href="entry.html"
        class="block text-cyan-400"
      >
        Entry
      </a>

      <a
        href="reports.html"
        class="block"
      >
        Reports
      </a>

      <a
        href="review.html"
        class="block"
      >
        Review
      </a>

      <a
        href="settings.html"
        class="block"
      >
        Settings
      </a>

    </nav>

  </aside>



  <!-- MAIN -->
  <main class="flex-1 p-8">


    <!-- HEADER -->
    <div class="mb-8">

      <h1 class="text-3xl font-bold">
        Daily Finance Entry
      </h1>

      <p class="text-slate-500 mt-2">
        Input daily restaurant revenue
      </p>

    </div>



    <!-- FORM -->
    <form
      id="entryForm"
      class="bg-white rounded-2xl p-6 shadow mb-8"
    >

      <div class="grid md:grid-cols-2 gap-6">


        <div>

          <label class="block mb-2 font-semibold">
            Date
          </label>

          <input
            id="entryDate"
            type="date"
            class="w-full border rounded-xl px-4 py-3"
          >

        </div>



        <div>

          <label class="block mb-2 font-semibold">
            Daily Budget
          </label>

          <input
            id="dailyBudgetDisplay"
            readonly
            class="w-full border rounded-xl px-4 py-3 bg-slate-50"
          >

        </div>



        <div>

          <label class="block mb-2 font-semibold">
            Food Revenue
          </label>

          <input
            id="foodRevenue"
            type="number"
            class="w-full border rounded-xl px-4 py-3"
          >

        </div>



        <div>

          <label class="block mb-2 font-semibold">
            Beverage Revenue
          </label>

          <input
            id="beverageRevenue"
            type="number"
            class="w-full border rounded-xl px-4 py-3"
          >

        </div>



      </div>


      <button
        type="submit"
        class="mt-6 bg-slate-950 text-white px-6 py-3 rounded-xl"
      >
        Save Entry
      </button>

    </form>



    <!-- TABLE -->
    <div class="bg-white rounded-2xl p-6 shadow">

      <h2 class="text-xl font-bold mb-6">
        Recent Entries
      </h2>


      <div class="overflow-x-auto">

        <table class="w-full">

          <thead>

            <tr class="border-b">

              <th class="text-left py-3">
                Date
              </th>

              <th class="text-left">
                Food
              </th>

              <th class="text-left">
                Beverage
              </th>

              <th class="text-left">
                Revenue
              </th>

              <th class="text-left">
                Cost
              </th>

              <th class="text-left">
                GOP
              </th>

              <th class="text-left">
                Edit
              </th>

              <th class="text-left">
                Delete
              </th>

            </tr>

          </thead>


          <tbody
            id="recentEntriesBody"
          ></tbody>

        </table>

      </div>

    </div>


  </main>

</div>



<script src="storage.js"></script>
<script src="settings.js"></script>
<script src="calculations.js"></script>
<script src="entry.js"></script>


</body>
</html>
