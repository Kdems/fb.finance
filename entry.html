<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    SKYBAR Daily Entry
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="assets/css/main.css"
  />

</head>


<body class="bg-slate-100 font-sans">

  <div class="flex min-h-screen">


    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white p-5">

      <h1 class="text-2xl font-bold mb-8">
        SKYBAR
      </h1>


      <nav class="space-y-3">

        <a
          href="index.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Dashboard
        </a>

        <a
          href="entry.html"
          class="block px-4 py-3 rounded-xl bg-slate-800"
        >
          Daily Entry
        </a>

        <a
          href="generic.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Operating Review
        </a>

        <a
          href="reports.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Reports
        </a>

        <a
          href="settings.html"
          class="block px-4 py-3 rounded-xl hover:bg-slate-800"
        >
          Settings
        </a>

      </nav>

    </aside>



    <!-- MAIN -->
    <main class="flex-1 p-6 space-y-6">


      <!-- HEADER -->
      <div>

        <h2 class="text-3xl font-bold">
          Daily Sales Entry
        </h2>

        <p class="text-slate-500">
          Input daily outlet revenue
        </p>

      </div>



      <!-- FORM -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <form
          id="entryForm"
          class="grid xl:grid-cols-5 gap-4"
        >

          <div>

            <label class="text-sm">
              Date
            </label>

            <input
              id="entryDate"
              type="date"
              required
              class="w-full border rounded-xl p-3"
            />

          </div>


          <div>

            <label class="text-sm">
              Food Revenue
            </label>

            <input
              id="foodRevenue"
              type="number"
              required
              class="w-full border rounded-xl p-3"
            />

          </div>


          <div>

            <label class="text-sm">
              Beverage Revenue
            </label>

            <input
              id="beverageRevenue"
              type="number"
              required
              class="w-full border rounded-xl p-3"
            />

          </div>


          <div>

            <label class="text-sm">
              Daily Budget
            </label>

            <input
              id="dailyBudgetDisplay"
              readonly
              class="w-full bg-slate-100 border rounded-xl p-3"
            />

          </div>


          <div class="flex items-end">

            <button
              type="submit"
              class="w-full bg-slate-900 text-white rounded-xl p-3"
            >
              Save Entry
            </button>

          </div>

        </form>

      </section>



      <!-- RECENT ENTRIES -->
      <section class="bg-white rounded-2xl p-5 shadow">

        <h3 class="text-xl font-bold mb-4">
          Recent Entries
        </h3>


        <div class="overflow-x-auto">

          <table class="w-full text-sm">

            <thead>

              <tr class="text-left border-b">

                <th class="py-3">
                  Date
                </th>

                <th>
                  Revenue
                </th>

                <th>
                  Cost
                </th>

                <th>
                  GOP
                </th>

                <th>
                  Edit
                </th>

                <th>
                  Delete
                </th>

              </tr>

            </thead>


            <tbody
              id="recentEntriesBody"
            ></tbody>

          </table>

        </div>

      </section>


    </main>

  </div>



  <!-- SCRIPTS -->

<script src="assets/js/storage.js"></script>
<script src="assets/js/settings.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/dashboard.js"></script>
<script src="assets/js/entry.js"></script>


  <!-- AUTO LOAD TABLE -->
  <script>

    document.addEventListener(
      "DOMContentLoaded",
      function() {

        if(
          typeof renderRecentEntries ===
          "function"
        ) {

          renderRecentEntries();

        }

      }
    );

  </script>


</body>

</html>
