<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Entry
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="p-8 space-y-8">




  <!-- DAILY ENTRY -->
  <section class="bg-white rounded-3xl p-6 shadow">

    <h2 class="text-2xl font-bold mb-4">
      Daily Entry
    </h2>



    <form
      id="dailyForm"
      class="grid grid-cols-3 gap-4">



      <select
        id="dailyOutlet"
        class="border rounded-xl p-3">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <input
        id="dailyDate"
        type="date"
        class="border rounded-xl p-3">



      <input
        id="dailyFoodRevenue"
        type="number"
        placeholder="Food Revenue"
        class="border rounded-xl p-3">



      <input
        id="dailyBeverageRevenue"
        type="number"
        placeholder="Beverage Revenue"
        class="border rounded-xl p-3">



      <button
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Daily

      </button>

    </form>

  </section>









  <!-- MONTHLY -->
  <section class="bg-white rounded-3xl p-6 shadow">

    <h2 class="text-2xl font-bold mb-4">
      Monthly Target
    </h2>



    <form
      id="monthlyForm"
      class="grid grid-cols-4 gap-4">



      <select
        id="monthlyOutlet"
        class="border rounded-xl p-3">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <input
        id="monthlyYear"
        type="number"
        placeholder="Year">



      <input
        id="monthlyMonth"
        type="number"
        placeholder="Month">



      <input
        id="foodTarget"
        type="number"
        placeholder="Food Target">



      <input
        id="beverageTarget"
        type="number"
        placeholder="Beverage Target">



      <input
        id="lyFoodRevenue"
        type="number"
        placeholder="LY Food Revenue">



      <input
        id="lyBeverageRevenue"
        type="number"
        placeholder="LY Beverage Revenue">



      <input
        id="foodCostPercent"
        type="number"
        placeholder="Food Cost %">



      <input
        id="beverageCostPercent"
        type="number"
        placeholder="Beverage Cost %">



      <input
        id="fixedCostPercent"
        type="number"
        placeholder="Fixed Cost %">



      <input
        id="gopTarget"
        type="number"
        placeholder="GOP Target">



      <button
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Monthly

      </button>

    </form>

  </section>









  <!-- ANNUAL -->
  <section class="bg-white rounded-3xl p-6 shadow">

    <h2 class="text-2xl font-bold mb-4">
      Annual Target
    </h2>



    <form
      id="annualForm"
      class="grid grid-cols-4 gap-4">



      <select
        id="annualOutlet">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <input
        id="annualYear"
        type="number"
        placeholder="Year">



      <input
        id="annualRevenueTarget"
        type="number"
        placeholder="Annual Revenue">



      <input
        id="annualGopTarget"
        type="number"
        placeholder="Annual GOP">



      <button
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Annual

      </button>

    </form>

  </section>









  <!-- RECENT -->
  <section class="bg-white rounded-3xl p-6 shadow">

    <h2 class="text-2xl font-bold mb-4">
      Recent Entries
    </h2>



    <div id="recentEntryList"></div>

  </section>


</div>



<script src="assets/js/storage.js"></script>
<script src="assets/js/entry.js"></script>

</body>
</html>
