<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Entry
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-cyan-900">

<div class="min-h-screen p-6 space-y-6">

<nav class="bg-[#2563EB] text-white rounded-3xl px-6 py-4">

  <div class="flex justify-between items-center">

    <h1 class="text-2xl font-bold">
      SKYBAR
    </h1>

    <div class="flex gap-3">

      <button
        onclick="location.href='index.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-blue-700">

        🏠 Dashboard

      </button>

      <button
        onclick="location.href='entry.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 bg-cyan-500">

        ➕ Entry

      </button>

      <button
        onclick="location.href='analysis.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-slate-700">

        📊 Analysis

      </button>

      <button
        onclick="location.href='report.html'"
        class="px-4 py-2 rounded-xl transition-all duration-200 hover:bg-slate-700">

        📄 Reports

      </button>

    </div>

  </div>

</nav>

  <!-- HEADER -->
  <div>

    <h1 class="text-4xl font-bold text-white">
      Entry Management
    </h1>

    <p class="text-slate-300">
      Daily performance & target control
    </p>

  </div>










  <!-- DAILY ENTRY -->
  <section class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

    <h2 class="text-2xl font-bold mb-5 text-slate-800">
      Daily Entry
    </h2>



    <form
      id="dailyForm"
      class="grid grid-cols-3 gap-4">



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2">

          Outlet

        </label>

        <select
          id="dailyOutlet"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

          <option>SKYBAR</option>
          <option>GCC</option>
          <option>BO6</option>

        </select>

      </div>



      <div>

      <label
        class="block text-sm font-medium mb-2">

        Date

      </label>

      <input
        id="dailyDate"
        type="date"
        class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

    </div>



    <div>

      <label
        class="block text-sm font-medium mb-2">

        Food Revenue

      </label>

      <input
        id="dailyFoodRevenue"
        type="number" min="0" step="1"
        class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

    </div> 



    <div>

      <label
        class="block text-sm font-medium mb-2">

        Beverage Revenue

      </label>

      <input
        id="dailyBeverageRevenue"
        type="nutype="number" min="0" step="1"mber"
        class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

    </div>



    <div>

      <label
        class="block text-sm font-medium mb-2">

        Auto Total Revenue

      </label>

      <input
        id="dailyTotalRevenue"
        readonly
        class="bg-slate-100 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

    </div>



     <div class="flex flex-col h-[95px]">

      <label
        class="text-sm font-medium mb-2 opacity-0">

        Action

      </label>

      <button
        type="submit"
        class="bg-cyan-500 hover:bg-cyan-600 text-white rounded-2xl p-3 font-medium w-full">

        Save Daily

      </button>

    </div>

    </form>

  </section>










  <!-- MONTHLY TARGET -->
  <section class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

    <h2 class="text-2xl font-bold mb-5 text-slate-800">
      Monthly Target
    </h2>



    <form
      id="monthlyForm"
      class="grid grid-cols-4 gap-4 items-start">



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2">

          Outlet

        </label>

        <select
          id="monthlyOutlet"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">


        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

        </select>

      </div>


        <div class="flex flex-col h-[95px]">

          <label
            class="text-sm font-medium mb-2">

            Year

          </label>

          <select
            id="monthlyYear"
            class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

          </select>

      </div>


        <div class="flex flex-col h-[95px]">

          <label
            class="text-sm font-medium mb-2">

            Month

          </label>

          <select
            id="monthlyMonth"
            class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

          </select>

      </div>


      <div>

        <label
          class="block text-sm font-medium mb-2">

          Food Target

        </label>

        <input
          id="foodTarget"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>


      <div>

        <label
          class="block text-sm font-medium mb-2">

          Beverage Target

        </label>

        <input
          id="beverageTarget"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          LY Food Revenue

        </label>

        <input
          id="lyFoodRevenue"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          LY Beverage Revenue

        </label>

        <input
          id="lyBeverageRevenue"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          Food Cost %

        </label>

        <input
          id="foodCostPercent"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          Beverage Cost %

        </label>

        <input
          id="beverageCostPercent"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          Fixed Cost %

        </label>

        <input
          id="fixedCostPercent"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div>

        <label
          class="block text-sm font-medium mb-2">

          GOP Target

        </label>

        <input
          id="gopTarget"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2 opacity-0">

          Action

        </label>

        <button
          type="submit"
          class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl p-3 font-medium w-full">

          Save Monthly

        </button>

      </div>

    </form>

  </section>










  <!-- ANNUAL TARGET -->
  <section class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

    <h2 class="text-2xl font-bold mb-5 text-slate-800">
      Annual Target
    </h2>



    <form
      id="annualForm"
      class="grid grid-cols-5 gap-4 items-end">



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2">

          Outlet

        </label>

        <select
          id="annualOutlet"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

            <option>SKYBAR</option>
            <option>GCC</option>
            <option>BO6</option>

        </select>

      </div>



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2">

          Year

        </label>

        <select
          id="annualYear"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

        </select>

      </div>



      <div class="flex flex-col h-[95px]">

        <label
          class="block text-sm font-medium mb-2">

          Annual Revenue

        </label>

        <input
          id="annualRevenueTarget"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div class="flex flex-col h-[95px]">

        <label
          class="block text-sm font-medium mb-2">

          Annual GOP

        </label>

        <input
          id="annualGopTarget"
          type="number" min="0" step="1"
          class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 w-full">

      </div>



      <div class="flex flex-col h-[95px]">

        <label
          class="text-sm font-medium mb-2 opacity-0">

          Action

        </label>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-2xl font-medium">

          Save Annual

        </button>

      </div>

    </form>

  </section>










  <!-- RECENT -->
  <section class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">

    <h2 class="text-2xl font-bold mb-5 text-slate-800">
      Recent Entries
    </h2>

<div class="grid grid-cols-3 gap-4 mb-5">

  <select
    id="filterOutlet"
    class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400">

    <option value="ALL">
      All Outlets
    </option>

    <option value="SKYBAR">
      SKYBAR
    </option>

    <option value="GCC">
      GCC
    </option>

    <option value="BO6">
      BO6
    </option>

  </select>





  <select
    id="filterYear"
    class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400">

  </select>





  <select
    id="filterMonth"
    class="border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400">

  </select>

</div>

    <div
      id="recentEntryList"
      class="space-y-2">

    </div>

  </section>


</div>


<script src="assets/js/storage.js"></script>
<script src="assets/js/entry.js"></script>

</body>
</html>
