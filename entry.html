<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Entry
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="min-h-screen p-6 space-y-6">



  <!-- HEADER -->
  <div>

    <h1 class="text-4xl font-bold">
      Entry Management
    </h1>

    <p class="text-slate-500">
      Daily performance & target control
    </p>

  </div>










  <!-- DAILY ENTRY -->
  <section class="bg-white rounded-3xl shadow p-6">

    <h2 class="text-2xl font-bold mb-5">
      Daily Entry
    </h2>



    <form
      id="dailyForm"
      class="grid grid-cols-3 gap-4">



      <select
        id="dailyOutlet"
        class="border rounded-xl p-3 w-full">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <input
        id="dailyDate"
        type="date"
        class="border rounded-xl p-3 w-full">



      <input
        id="dailyFoodRevenue"
        type="number"
        placeholder="Food Revenue"
        class="border rounded-xl p-3 w-full">



      <input
        id="dailyBeverageRevenue"
        type="number"
        placeholder="Beverage Revenue"
        class="border rounded-xl p-3 w-full">



      <input
        id="dailyTotalRevenue"
        readonly
        placeholder="Auto Total Revenue"
        class="bg-slate-100 border rounded-xl p-3 w-full">



      <button
        type="submit"
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Daily

      </button>

    </form>

  </section>










  <!-- MONTHLY TARGET -->
  <section class="bg-white rounded-3xl shadow p-6">

    <h2 class="text-2xl font-bold mb-5">
      Monthly Target
    </h2>



    <form
      id="monthlyForm"
      class="grid grid-cols-4 gap-4">



      <select
        id="monthlyOutlet"
        class="border rounded-xl p-3 w-full">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <select
      id="monthlyYear"
      class="border rounded-xl p-3 w-full">

      </select>



      <select
      id="monthlyMonth"
      class="border rounded-xl p-3 w-full">

      </select>



      <input
        id="foodTarget"
        type="number"
        placeholder="Food Target"
        class="border rounded-xl p-3 w-full">



      <input
        id="beverageTarget"
        type="number"
        placeholder="Beverage Target"
        class="border rounded-xl p-3 w-full">



      <input
        id="lyFoodRevenue"
        type="number"
        placeholder="LY Food Revenue"
        class="border rounded-xl p-3 w-full">



      <input
        id="lyBeverageRevenue"
        type="number"
        placeholder="LY Beverage Revenue"
        class="border rounded-xl p-3 w-full">



      <input
        id="foodCostPercent"
        type="number"
        placeholder="Food Cost %"
        class="border rounded-xl p-3 w-full">



      <input
        id="beverageCostPercent"
        type="number"
        placeholder="Beverage Cost %"
        class="border rounded-xl p-3 w-full">



      <input
        id="fixedCostPercent"
        type="number"
        placeholder="Fixed Cost %"
        class="border rounded-xl p-3 w-full">



      <input
        id="gopTarget"
        type="number"
        placeholder="GOP Target"
        class="border rounded-xl p-3 w-full">



      <button
        type="submit"
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Monthly

      </button>

    </form>

  </section>










  <!-- ANNUAL TARGET -->
  <section class="bg-white rounded-3xl shadow p-6">

    <h2 class="text-2xl font-bold mb-5">
      Annual Target
    </h2>



    <form
      id="annualForm"
      class="grid grid-cols-5 gap-4 items-end">



      <select
        id="annualOutlet"
        class="border rounded-xl p-3 w-full">

        <option>
          SKYBAR
        </option>

        <option>
          GCC
        </option>

        <option>
          BO6
        </option>

      </select>



      <select
      id="annualYear"
      class="border rounded-xl p-3 w-full">

      </select>



      <input
        id="annualRevenueTarget"
        type="number"
        placeholder="Annual Revenue"
        class="border rounded-xl p-3 w-full">



      <input
        id="annualGopTarget"
        type="number"
        placeholder="Annual GOP"
        class="border rounded-xl p-3 w-full">



      <button
        type="submit"
        class="bg-slate-950 text-white rounded-xl p-3">

        Save Annual

      </button>

    </form>

  </section>










  <!-- RECENT -->
  <section class="bg-white rounded-3xl shadow p-6">

    <h2 class="text-2xl font-bold mb-5">
      Recent Entries
    </h2>

<div class="grid grid-cols-3 gap-4 mb-5">

  <select
    id="filterOutlet"
    class="border rounded-xl p-3">

    <option value="ALL">
      All Outlets
    </option>

    <option value="SKYBAR">
      SKYBAR
    </option>

    <option value="GCC">
      GCC
    </option>

    <option value="BO6">
      BO6
    </option>

  </select>





  <select
    id="filterYear"
    class="border rounded-xl p-3">

  </select>





  <select
    id="filterMonth"
    class="border rounded-xl p-3">

  </select>

</div>

    <div
      id="recentEntryList"
      class="space-y-2">

    </div>

  </section>


</div>


<script src="assets/js/storage.js"></script>
<script src="assets/js/entry.js"></script>

</body>
</html>
